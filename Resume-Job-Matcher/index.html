<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume-Job Matcher Pro 🚀</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        body.dark { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideIn 0.8s ease;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) { .upload-section { grid-template-columns: 1fr; } }
        
        .file-card {
            background: rgba(255,255,255,0.15);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .file-card.dragover { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        
        .file-icon { font-size: 3rem; color: #4ade80; margin-bottom: 15px; }
        
        .file-label { font-size: 1.1rem; font-weight: 500; color: white; margin-bottom: 10px; }
        
        .file-status {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            min-height: 20px;
        }
        
        input[type="file"] {
            position: absolute;
            width: 1px; height: 1px; opacity: 0;
            pointer-events: none;
        }
        
        .analyze-btn {
            background: linear-gradient(45deg, #4ade80, #22c55e);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(74, 222, 128, 0.6); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #result {
            margin-top: 40px;
            padding: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 25px;
            backdrop-filter: blur(20px);
            display: none;
            animation: resultSlide 0.6s ease;
            text-align: center;
        }
        
        @keyframes resultSlide { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .score-circle {
            width: 200px; height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .score-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        
        .score-circle circle { fill: none; stroke-width: 8; }
        
        .bg-circle { stroke: rgba(255,255,255,0.1); }
        
        .progress-circle {
            stroke-linecap: round;
            stroke: url(#gradient);
            transition: stroke-dasharray 1.5s ease;
        }
        
        .score-badge {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .message {
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-weight: 500;
            color: white;
        }
        
        .recs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .rec-card {
            background: rgba(74, 222, 128, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 222, 128, 0.3);
            transition: transform 0.3s ease;
        }
        
        .rec-card:hover { transform: translateY(-3px); }
        
        .dark-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 50px; height: 50px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dark-toggle:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        
        .status { color: #fbbf24; font-weight: 500; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        
        @media (max-width: 768px) {
            .container { padding: 20px; margin: 10px; }
            .score-badge { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="container">
        <h1><i class="fas fa-magic"></i> Resume Matcher Pro</h1>
        <p class="subtitle">Upload resume & job description. Get instant match score + recommendations! ✨</p>
        
        <div class="upload-section">
            <label class="file-card" id="resumeCard">
                <div class="file-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="file-label">📄 Resume</div>
                <div class="file-status" id="resumeStatus">Click or drag TXT, PDF, DOCX</div>
                <input type="file" id="resumeFile" accept=".txt,.pdf,.docx">
            </label>
            
            <label class="file-card" id="jobCard">
                <div class="file-icon">
                    <i class="fas fa-briefcase"></i>
                </div>
                <div class="file-label">💼 Job Description</div>
                <div class="file-status" id="jobStatus">Click or drag TXT, PDF, DOCX</div>
                <input type="file" id="jobFile" accept=".txt,.pdf,.docx">
            </label>
        </div>
        
        <button class="analyze-btn" onclick="calculateMatch()" id="analyzeBtn">
            <span id="btnText">🚀 Analyze Match Score</span>
        </button>
        
        <div id="result">
            <div class="score-circle">
                <svg viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4ade80"/>
                            <stop offset="100%" stop-color="#22c55e"/>
                        </linearGradient>
                    </defs>
                    <circle class="bg-circle" cx="50" cy="50" r="45"></circle>
                    <circle class="progress-circle" cx="50" cy="50" r="45" stroke-dasharray="0 282.74"></circle>
                </svg>
                <div class="score-badge" id="scoreBadge">0%</div>
            </div>
            <div class="message" id="message"></div>
            
            <div class="recs-grid" id="recsGrid"></div>
        </div>
    </div>

    <script>
        // Dark mode toggle
        function toggleDark() {
            document.body.classList.toggle('dark');
            const icon = document.querySelector('.dark-toggle i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }
        
        // Drag-drop support
        ['resumeCard', 'jobCard'].forEach(id => {
            const card = document.getElementById(id);
            const input = card.querySelector('input[type="file"]');
            
            card.ondragover = card.ondragenter = e => {
                e.preventDefault();
                card.classList.add('dragover');
            };
            
            card.ondragleave = card.ondrop = e => {
                e.preventDefault();
                card.classList.remove('dragover');
            };
            
            card.ondrop = e => {
                input.files = e.dataTransfer.files;
                updateStatus(id, Array.from(e.dataTransfer.files)[0]?.name || '');
            };
            
            card.onclick = () => input.click();
            input.onchange = () => updateStatus(id, input.files[0]?.name || '');
        });
        
        function updateStatus(cardId, filename) {
            const statusEl = document.getElementById(cardId === 'resumeCard' ? 'resumeStatus' : 'jobStatus');
            if (filename) {
                statusEl.textContent = filename;
                statusEl.className = 'file-status success';
            } else {
                statusEl.textContent = cardId === 'resumeCard' ? 'Click or drag TXT, PDF, DOCX' : 'Click or drag TXT, PDF, DOCX';
                statusEl.className = 'file-status';
            }
        }
        
        // Preserve original logic
        const stopwords = new Set(["and", "or", "the", "is", "in", "at", "of", "a", "an", "with", "for", "to"]);
        
        function preprocess(text) {
            text = text.toLowerCase().replace(/[^\w\s]/g, '');
            const words = text.split(/\s+/).filter(w => w.length > 0);
            return words.filter(w => !stopwords.has(w));
        }
        
        function createVocabulary(doc1, doc2) {
            const vocab = new Set([...doc1, ...doc2]);
            return Array.from(vocab);
        }
        
        function termFrequency(words, vocabulary) {
            return vocabulary.map(term => words.filter(w => w === term).length);
        }
        
        function cosineSimilarity(vec1, vec2) {
            const dot = vec1.reduce((sum, a, i) => sum + a * vec2[i], 0);
            const mag1 = Math.sqrt(vec1.reduce((sum, a) => sum + a * a, 0));
            const mag2 = Math.sqrt(vec2.reduce((sum, b) => sum + b * b, 0));
            return mag1 === 0 || mag2 === 0 ? 0 : dot / (mag1 * mag2);
        }
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        async function extractText(file) {
            const type = file.name.toLowerCase().match(/\.(txt|pdf|docx)$/i)?.[1] || 'unknown';
            return new Promise((resolve, reject) => {
                if (type === 'txt') {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsText(file);
                } else if (type === 'pdf') {
                    const reader = new FileReader();
                    reader.onload = async () => {
                        try {
                            const pdf = await pdfjsLib.getDocument({data: reader.result}).promise;
                            let text = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                text += content.items.map(item => item.str).join(' ') + ' ';
                            }
                            resolve(text);
                        } catch (e) { reject(e); }
                    };
                    reader.readAsArrayBuffer(file);
                } else if (type === 'docx') {
                    const reader = new FileReader();
                    reader.onload = async () => {
                        try {
                            const result = await mammoth.extractRawText({arrayBuffer: reader.result});
                            resolve(result.value);
                        } catch (e) { reject(e); }
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    reject(new Error(`Unsupported: ${type}. Use TXT, PDF, DOCX.`));
                }
            });
        }
        
        async function calculateMatch() {
            const resumeFile = document.getElementById('resumeFile').files[0];
            const jobFile = document.getElementById('jobFile').files[0];
            
            if (!resumeFile || !jobFile) {
                alert('Please upload both files! 📁');
                return;
            }
            
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Analyzing...';
            
            try {
                const [resumeText, jobText] = await Promise.all([
                    extractText(resumeFile), extractText(jobFile)
                ]);
                
                await new Promise(r => setTimeout(r, 1000)); // Smooth animation
                
                computeResults(resumeText, jobText);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btnText.textContent = '🚀 Analyze Match Score';
            }
        }
        
        function computeResults(rText, jText) {
            const resumeWords = preprocess(rText);
            const jobWords = preprocess(jText);
            const vocabulary = createVocabulary(resumeWords, jobWords);
            const resumeVec = termFrequency(resumeWords, vocabulary);
            const jobVec = termFrequency(jobWords, vocabulary);
            const similarity = cosineSimilarity(resumeVec, jobVec);
            const score = Math.round(similarity * 100 * 100) / 100;
            
            // Animate score circle
            const circumference = 282.74;
            const offset = circumference - (score / 100) * circumference;
            document.querySelector('.progress-circle').style.strokeDasharray = `${circumference * (score / 100)} ${circumference}`;
            
            document.getElementById('scoreBadge').textContent = score + '%';
            
            const messages = {
                90: '🎉 Perfect Match!',
                80: '✅ Excellent Fit!',
                65: '👍 Good Match!',
                50: '⚠️ Needs Polish',
                0: '🔄 Analyzing...'
            };
            
            let status = '⚠️ Needs Polish';
            if (score >= 90) status = '🎉 Perfect Match!';
            else if (score >= 80) status = '✅ Excellent Fit!';
            else if (score >= 65) status = '👍 Good Match!';
            
            document.getElementById('message').innerHTML = `<i class="fas fa-chart-line"></i> ${status}<br><small>Score: ${score}%</small>`;
            
            // Recommendations
            const recs = [];
            const threshold = 0.1;
            for (let i = 0; i < vocabulary.length; i++) {
                const term = vocabulary[i];
                const jobTf = jobVec[i];
                const resumeTf = resumeVec[i];
                if (jobTf > resumeTf && (jobTf - resumeTf) > threshold) {
                    recs.push(term);
                }
            }
            
            const recGrid = document.getElementById('recsGrid');
            recGrid.innerHTML = '';
            
            if (recs.length === 0) {
                const card = document.createElement('div');
                card.className = 'rec-card';
                card.innerHTML = '<i class="fas fa-check-circle success"></i><br>🎯 No major gaps! Ready to apply!';
                recGrid.appendChild(card);
            } else {
                recs.slice(0, 6).forEach((term, i) => {
                    const card = document.createElement('div');
                    card.className = 'rec-card';
                    card.innerHTML = `<i class="fas fa-lightbulb status"></i><br><strong>${term}</strong><br><small>Priority ${i+1}</small>`;
                    recGrid.appendChild(card);
                });
            }
            
            document.getElementById('result').style.display = 'block';
            
            // Confetti for great scores
            if (score >= 90) {
                // Simple confetti effect
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.style.cssText = `
                            position: fixed; top: 0; left: 50%;
                            width: 10px; height: 10px;
                            background: #4ade80;
                            transform: translateX(${(Math.random()-0.5)*400}px) rotate(${Math.random()*360}deg);
                            animation: fall 2s linear forwards;
                            z-index: 9999; border-radius: 50%; opacity: 0.8;
                        `;
                        document.body.appendChild(confetti);
                        setTimeout(() => confetti.remove(), 2000);
                    }, i * 20);
                }
            }
        }
        
        // CSS for confetti
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
